name: price-check

on:
  schedule:
    # Once per day (12:17 UTC / 8:17 AM EDT). GitHub may delay scheduled runs under load.
    - cron: "17 12 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # commit the updated price history
  issues: write     # open an alert issue

concurrency:
  group: price-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Self-test the parser
        run: python check_price.py --selftest

      - name: Check prices
        id: check
        env:
          # Optional: set this repo secret to also ping Slack/Discord.
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          # Optional: set this repo secret to route requests through ScraperAPI.
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python check_price.py --config config.json --state data/price_history.json --dump
          cat << 'EOF' > diag.py
          import re, sys
          from pathlib import Path
          files = list(Path(".").glob("dump_*.html"))
          if not files:
              print("No dump files found.")
              sys.exit(0)
          html = files[0].read_text(errors="ignore")
          title = re.search(r"<title>(.*?)</title>", html, re.I)
          print("PAGE TITLE:", title.group(1).strip() if title else "None")
          print("NEXT_DATA IN HTML:", "__NEXT_DATA__" in html)
          print("LD+JSON IN HTML:", "application/ld+json" in html)
          ld_json = re.findall(r"<script[^>]+type=\"application/ld\+json\"[^>]*>(.*?)</script>", html, re.DOTALL)
          print("LD+JSON BLOCKS FOUND:", len(ld_json))
          for i, block in enumerate(ld_json):
              print(f"  Block {i}:", block[:2000].strip())
          EOF
          python3 diag.py

      - name: Commit price history
        run: |
          if [[ -n "$(git status --porcelain data/price_history.json)" ]]; then
            git config user.name "price-bot"
            git config user.email "price-bot@users.noreply.github.com"
            git add data/price_history.json
            git commit -m "price update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No price change to commit."
          fi

      - name: Open alert issue
        if: steps.check.outputs.has_alert == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Price alert — $(date -u +%Y-%m-%d)" \
            --body-file alert.md \
            --label price-alert 2>/dev/null \
          || gh issue create \
            --title "Price alert — $(date -u +%Y-%m-%d)" \
            --body-file alert.md
